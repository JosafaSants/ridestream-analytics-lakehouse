# =============================================================
# Infraestrutura local do RideStream Analytics Lakehouse
# Sobe o Kafka e suas dependências para simular o ambiente
# de produção de um app de transporte em tempo real
# =============================================================

services:

  # Zookeeper: o coordenador do cluster Kafka
  # sem ele o Kafka não sabe quais brokers estão vivos
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ridestream-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # Kafka: o coração do pipeline de streaming
  # é aqui que os eventos de corridas chegam antes do Spark processar
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ridestream-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # Permite conexão tanto de dentro do Docker quanto da nossa máquina
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Fator de replicação 1 porque temos apenas 1 broker local
      # em produção na AWS esse valor seria 3 para alta disponibilidade
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # Kafka UI: interface visual para inspecionar tópicos e mensagens
  # essencial para debugar o pipeline sem precisar usar o terminal
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ridestream-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ridestream-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092