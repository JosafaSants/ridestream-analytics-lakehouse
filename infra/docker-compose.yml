# =============================================================
# Infraestrutura local do RideStream Analytics Lakehouse v1.0
# Stack cloud-agnostic: cada serviço tem equivalente direto em
# produção — documentado no README como decisão de FinOps
# =============================================================
services:

  # ------------------------------------------------------------------
  # Redpanda: substitui Kafka + Zookeeper em um único container
  # API 100% compatível com Kafka — producer e jobs Spark não mudam
  # Equivalente em produção: Amazon MSK / Confluent Cloud
  # ------------------------------------------------------------------
  redpanda:
    image: redpandadata/redpanda:v23.3.11
    container_name: ridestream-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr internal://redpanda:29092,external://localhost:9092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=warn
    ports:
      - "9092:9092"    # Kafka API — mesmo porta do Kafka anterior
      - "18081:18081"  # Schema Registry
      - "18082:18082"  # REST Proxy
      - "9644:9644"    # Admin API + métricas Prometheus
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ------------------------------------------------------------------
  # Kafka UI: interface visual para inspecionar tópicos e mensagens
  # Compatível com Redpanda sem nenhuma alteração
  # ------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ridestream-kafka-ui
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ridestream-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: redpanda:29092

  # ------------------------------------------------------------------
  # MinIO: storage S3-compatível local
  # Substitui o diretório data/ local — Delta Lake grava aqui
  # Equivalente em produção: Amazon S3 / Google Cloud Storage
  # ------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: ridestream-minio
    command: server /data --console-address ":9001"
    ports:
      - "9100:9000"   # S3 API — mesmo protocolo que o boto3 usa com AWS
      - "9001:9001"   # Console web do MinIO
    environment:
      MINIO_ROOT_USER: ridestream
      MINIO_ROOT_PASSWORD: ridestream123
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ------------------------------------------------------------------
  # Prometheus: coleta métricas do Redpanda automaticamente
  # Equivalente em produção: Amazon CloudWatch Metrics
  # ------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: ridestream-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      redpanda:
        condition: service_healthy

  # ------------------------------------------------------------------
  # Grafana: dashboards de observabilidade
  # Equivalente em produção: Amazon CloudWatch Dashboards
  # ------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: ridestream-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ridestream123
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

# Volumes nomeados para persistência dos dados entre restarts
volumes:
  minio_data:
  grafana_data: